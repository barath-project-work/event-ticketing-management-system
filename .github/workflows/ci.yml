name: Event Ticketing CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Dmaven.test.failure.ignore=false"

jobs:
  # ---------------------------------------------------------------------------
  # Build & Unit Tests
  # ---------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ticketing_test
          POSTGRES_USER: ticketing
          POSTGRES_PASSWORD: ticketing_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U ticketing
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Compile
        run: mvn compile -B -q

      - name: Run Unit Tests (H2)
        run: mvn test -Dtest="!*IntegrationTest" -B

      - name: Run Integration Tests (Testcontainers)
        run: mvn test -Dtest="*IntegrationTest" -Dspring.profiles.active=integration-test -B
        env:
          DOCKER_HOST: unix:///var/run/docker.sock

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

  # ---------------------------------------------------------------------------
  # Security Scan (Dependency-Check)
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check -B -q || true

  # ---------------------------------------------------------------------------
  # k6 Load Tests
  # ---------------------------------------------------------------------------
  load-test:
    name: k6 Load Test (Smoke)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Start application
        run: |
          docker compose up -d
          sleep 10
          mvn spring-boot:run -Dspring-boot.run.profiles=dev &
          sleep 30  # Wait for app startup

      - name: Run k6 smoke test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/scenarios/smoke-test.js
        env:
          BASE_URL: http://localhost:8080

      - name: Run k6 per-seat hold simulation
        uses: grafana/k6-action@v0.3.1
        with:
          filename: k6/scenarios/per-seat-hold.js
        env:
          BASE_URL: http://localhost:8080

  # ---------------------------------------------------------------------------
  # Docker Build
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: event-ticketing:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image event-ticketing:latest --severity HIGH,CRITICAL --exit-code 0
