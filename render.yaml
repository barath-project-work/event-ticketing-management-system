# Render Blueprint for Event Ticketing System
# Deploy: https://render.com/docs/blueprint-spec
#
# Prerequisites:
#   1. Create a free Neon PostgreSQL database at https://console.neon.tech
#   2. Copy the connection string (starts with "postgresql://...")
#   3. Paste as SPRING_DATASOURCE_URL during Render Blueprint setup

services:
  - type: web
    name: event-ticketing
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile.render
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        value: postgresql://neondb_owner:xxxxx@ep-xxxxx.us-east-2.aws.neon.tech/neondb?sslmode=require
        # ⬆ REPLACE THIS with your actual Neon connection string
      - key: SPRING_DATASOURCE_USERNAME
        value: neondb_owner
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: ADMIN_TOKEN
        value: admin-token-001
      - key: JAVA_OPTS
        value: -XX:+UseZGC -XX:MaxRAMPercentage=75.0
    healthCheckPath: /actuator/health
    autoDeploy: true
