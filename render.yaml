# Render Blueprint for Event Ticketing System
# Deploy: https://render.com/docs/blueprint-spec
#
# Prerequisites:
#   1. Create a free Neon PostgreSQL database at https://console.neon.tech
#   2. Copy the connection string (starts with "postgresql://...")
#   3. Paste as SPRING_DATASOURCE_URL during Render Blueprint setup

services:
  - type: web
    name: event-ticketing
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile.render
    envVars:
      # ⚠️ IMPORTANT: Replace SPRING_DATASOURCE_URL with your actual Neon URL
      # Your Neon URL will look like: postgresql://user:pass@ep-xxx.us-east-2.aws.neon.tech/neondb
      # Add 'jdbc:' prefix → jdbc:postgresql://user:pass@ep-xxx.us-east-2.aws.neon.tech/neondb?sslmode=require
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://neondb_owner:npg_o4TPpgKXq3RG@ep-aged-mud-atvqktg9.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: neondb_owner
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: ADMIN_TOKEN
        value: admin-token-001
      - key: JAVA_OPTS
        value: -XX:+UseZGC -XX:MaxRAMPercentage=75.0
    healthCheckPath: /actuator/health
    autoDeploy: true
