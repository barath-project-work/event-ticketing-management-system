# Render Blueprint: Backend API for Event Ticketing
# Deploy this service first, then set VITE_API_URL in Vercel

services:
  - type: web
    name: event-ticketing-api
    runtime: java
    repo: https://github.com/barath-project-work/event-ticketing-management-system
    buildCommand: mvn clean package -Dskip.frontend=true -DskipTests
    startCommand: java -jar target/event-ticketing-*.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: default
      - key: SERVER_PORT
        value: "8080"
      - key: JAVA_OPTS
        value: "-Xmx256m -Xms128m"
    healthCheckPath: /actuator/health
    autoDeploy: true
