# Production profile overrides
# Designed for Render.com deployment where Redis may not be available

spring:
  # Use Caffeine cache instead of Redis for simplicity
  cache:
    type: caffeine

  # Flyway manages schema in prod
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

# Resilience4j circuit breaker configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

# Logging (structured JSON for production log aggregation)
logging:
  structured:
    format: logstash
  level:
    com.ticketing: INFO

# Rate limiting
rate-limiting:
  hold:
    capacity: 100
    refill-per-second: 50
