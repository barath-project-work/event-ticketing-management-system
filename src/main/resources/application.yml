# =============================================================================
# Default profile: H2 + Caffeine (zero external dependencies)
# Use 'prod' profile for PostgreSQL + Redis in production/docker
# =============================================================================

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
  datasource:
    url: jdbc:h2:mem:ticketing;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      connection-timeout: 3000
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
  flyway:
    enabled: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=60s
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: 8080

logging:
  level:
    com.ticketing: DEBUG
    org.hibernate: WARN
    org.springframework.cache: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    tags:
      application: ticketing

resilience4j:
  circuitbreaker:
    configs:
      default:
        register-health-indicator: true
        sliding-window-size: 20
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 2000ms
        writable-stack-trace-enabled: true
    instances:
      reservationService:
        base-config: default
      database:
        base-config: default
        wait-duration-in-open-state: 30s

retry:
  max-attempts: 4
  initial-delay-ms: 50
  multiplier: 2.0
  max-delay-ms: 500

reservation:
  hold:
    duration-seconds: 180
  sweeper:
    fixed-rate-ms: 30000

rate-limiting:
  hold:
    capacity: 100
    refill-tokens: 50
    refill-period-seconds: 1
